name: GSSoC — Auto Assign Issue

# ─────────────────────────────────────────────────────────────────────────────
# Runs when someone comments on an issue.
# • Person comments  "/assign" or "I want to work on this" etc.
# • Checks how many open issues that person already has assigned
# • If less than 1  → assigns the issue + posts confirmation comment
# • If 1 or more   → denies assignment (must solve current issue first)
# • Only the issue creator or repo owner/maintainer can self-assign an issue
# • Daily cap: max 4 new assignments per day per contributor
# • Maintainer can comment "/unassign @username" to free up a slot
# • Maintainer can comment "/assign @username" to assign someone manually
# ─────────────────────────────────────────────────────────────────────────────

on:
  issue_comment:
    types: [created]

jobs:
  auto-assign:
    name: Auto Assign Issue (1 at a time, max 3/day)
    runs-on: ubuntu-latest

    # Only run on issue comments, not PR comments
    if: ${{ !github.event.issue.pull_request }}

    permissions:
      issues: write

    steps:
      - name: Handle issue assignment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const comment  = context.payload.comment;
            const issue    = context.payload.issue;
            const issueNum = issue.number;
            const commenter = comment.user.login;
            const commentBody = comment.body.trim();
            const TOTAL_LIMIT = 1;  // Only 1 issue at a time — must resolve it before picking another
            const DAILY_LIMIT = 4;  // Max 4 new assignments per day

            // ── Ensure required labels exist ──────────────────────────────
            const requiredLabels = [
              { name: 'gssoc:assigned',   color: 'fbca04', description: 'GSSoC: Issue has been assigned' },
              { name: 'gssoc:available',  color: '0e8a16', description: 'GSSoC: Issue is available to pick up' },
              { name: "GSSoC'26",         color: '0e8a16', description: 'Part of GirlScript Summer of Code 2026' },
            ];
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...label });
                }
              }
            }

            // ── Helper: count open issues assigned to a user (total) ────
            async function countAssignedIssues(username) {
              const { data } = await github.rest.issues.listForRepo({
                owner, repo,
                assignee: username,
                state: 'open',
                per_page: 100,
              });
              return data.filter(i => !i.pull_request).length;
            }

            // ── Helper: count issues assigned to a user TODAY ─────────────
            // Checks how many issues were assigned to this user in the last 24 hours
            // by scanning issue timeline/events for "assigned" events today
            async function countAssignedToday(username) {
              const now   = new Date();
              const todayStart = new Date(
                now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0
              ).toISOString();

              // Get all open issues assigned to the user
              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner, repo,
                assignee: username,
                state: 'open',
                per_page: 100,
              });
              const realIssues = openIssues.filter(i => !i.pull_request);

              let countToday = 0;
              for (const issue of realIssues) {
                try {
                  const { data: events } = await github.rest.issues.listEvents({
                    owner, repo,
                    issue_number: issue.number,
                    per_page: 50,
                  });
                  // Check if an "assigned" event for this user happened today
                  const assignedToday = events.some(e =>
                    e.event === 'assigned' &&
                    e.assignee?.login === username &&
                    new Date(e.created_at) >= new Date(todayStart)
                  );
                  if (assignedToday) countToday++;
                } catch (e) {
                  console.log(`Could not fetch events for issue #${issue.number}: ${e.message}`);
                }
              }
              return countToday;
            }

            // ── Helper: check if user is a maintainer / collaborator ──────
            async function isMaintainer(username) {
              try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner, repo, username,
                });
                return ['admin', 'maintain', 'write'].includes(data.permission);
              } catch {
                return false;
              }
            }

            // ── Helper: get current assignees of this issue ───────────────
            const currentAssignees = issue.assignees.map(a => a.login);

            // ─────────────────────────────────────────────────────────────
            // COMMAND: /assign (self-assign by commenter)
            // ─────────────────────────────────────────────────────────────
            const selfAssignPatterns = [
              /^\/assign$/i,
              /^\/take$/i,
              /i('d like| want) to (work on|fix|take|handle|tackle) this/i,
              /^(can i|may i) (work on|take|fix|handle|tackle) this\??$/i,
              /^assign (this |it )?to me\??$/i,
              /^i('ll| will) (work on|fix|take|handle|tackle) this/i,
              /^\/claim$/i,
            ];

            // COMMAND: /assign @username  (maintainer assigns someone else)
            const maintainerAssignMatch = commentBody.match(/^\/assign\s+@([\w-]+)$/i);

            // COMMAND: /unassign @username  (maintainer removes someone)
            const unassignMatch = commentBody.match(/^\/unassign\s+@([\w-]+)$/i);

            // COMMAND: /unassign  (self-unassign)
            const selfUnassignPatterns = [
              /^\/unassign$/i,
              /^\/drop$/i,
              /^\/abandon$/i,
              /i('m| am) (no longer|not) (working on|able to)/i,
              /^unassign me\??$/i,
            ];

            // ═════════════════════════════════════════════════════════════
            // HANDLE SELF-ASSIGN
            // ═════════════════════════════════════════════════════════════
            if (selfAssignPatterns.some(rx => rx.test(commentBody))) {

              // Check if issue is already closed
              if (issue.state === 'closed') {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum,
                  body: `Hey @${commenter}! ❌ This issue is already **closed**. Please look for an open issue to contribute to.\n\n_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                });
                return;
              }

              // ── Check: only issue creator or repo owner can self-assign ──
              const issueAuthor = issue.user.login;
              const commenterIsMaintainer = await isMaintainer(commenter);

              if (commenter !== issueAuthor && !commenterIsMaintainer) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum,
                  body: [
                    `## ❌ Assignment Not Allowed — @${commenter}`,
                    ``,
                    `You can only self-assign an issue if:`,
                    `- 🙋 **You created the issue**, or`,
                    `- 🛡️ **You are a maintainer / repo owner**`,
                    ``,
                    `This issue was created by @${issueAuthor}. You are not permitted to assign yourself to issues created by other contributors.`,
                    ``,
                    `Feel free to open your own issue if you have a bug or feature to work on! 💡`,
                    ``,
                    `_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                  ].join('\n'),
                });
                console.log(`🚫 @${commenter} tried to self-assign issue #${issueNum} created by @${issueAuthor} — denied.`);
                return;
              }

              // Check if already assigned to someone
              if (currentAssignees.length > 0) {
                const assigneeList = currentAssignees.map(a => `@${a}`).join(', ');
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum,
                  body: [
                    `Hey @${commenter}! ⚠️ This issue is already assigned to ${assigneeList}.`,
                    ``,
                    `Please pick another open issue. You can browse available ones [here](https://github.com/${owner}/${repo}/issues?q=is%3Aissue+is%3Aopen+no%3Aassignee).`,
                    ``,
                    `_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                  ].join('\n'),
                });
                return;
              }

              // Check if commenter is already assigned to this issue
              if (currentAssignees.includes(commenter)) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum,
                  body: `Hey @${commenter}! You are **already assigned** to this issue. Go ahead and work on it! 💪\n\n_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                });
                return;
              }

              // ── Check TOTAL open issue limit (max 1 at a time) ──────────
              const assignedCount = await countAssignedIssues(commenter);

              if (assignedCount >= TOTAL_LIMIT) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum,
                  body: [
                    `## ❌ You Already Have an Active Issue — @${commenter}`,
                    ``,
                    `You currently have **${assignedCount} open issue(s)** assigned. Our policy allows only **1 issue at a time** — please resolve your current issue before picking up a new one.`,
                    ``,
                    `### What you can do:`,
                    `- ✅ Complete or close your existing assigned issue first`,
                    `- 🔁 Comment \`/unassign\` on an issue you no longer want to work on`,
                    `- 📋 View your assigned issues [here](https://github.com/${owner}/${repo}/issues?q=is%3Aissue+is%3Aopen+assignee%3A${commenter})`,
                    ``,
                    `Once you've wrapped up your current issue, come back and comment \`/assign\` here! 🙏`,
                    ``,
                    `_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                  ].join('\n'),
                });
                console.log(`🚫 @${commenter} already has an active issue (limit: 1).`);
                return;
              }

              // ── Check DAILY limit (max 4 new assignments per day) ─────────
              const assignedTodayCount = await countAssignedToday(commenter);

              if (assignedTodayCount >= DAILY_LIMIT) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum,
                  body: [
                    `## ❌ Daily Assignment Limit Reached — @${commenter}`,
                    ``,
                    `You have already been assigned **${assignedTodayCount} issue(s) today**, which is the daily maximum of **${DAILY_LIMIT} issues per day**.`,
                    ``,
                    `### What you can do:`,
                    `- ⏰ Come back **tomorrow** and comment \`/assign\` again`,
                    `- 💪 Focus on completing the issues you already have today`,
                    `- 📋 View your active issues [here](https://github.com/${owner}/${repo}/issues?q=is%3Aissue+is%3Aopen+assignee%3A${commenter})`,
                    ``,
                    `_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                  ].join('\n'),
                });
                console.log(`🚫 @${commenter} hit the daily ${DAILY_LIMIT}-issue limit.`);
                return;
              }

              // All checks passed — assign the issue
              await github.rest.issues.addAssignees({
                owner, repo, issue_number: issueNum,
                assignees: [commenter],
              });

              // Add gssoc:assigned label, remove gssoc:available if present
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNum, labels: ['gssoc:assigned'],
              });
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issueNum, name: 'gssoc:available',
                });
              } catch {}

              const remainingTotal = TOTAL_LIMIT - assignedCount - 1;
              const remainingToday = DAILY_LIMIT - assignedTodayCount - 1;
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNum,
                body: [
                  `## ✅ Issue Assigned — @${commenter}`,
                  ``,
                  `You have been assigned to this issue! Here's what to do next:`,
                  ``,
                  `1. 🍴 Fork the repo and create a new branch: \`git checkout -b fix/issue-${issueNum}\``,
                  `2. 💻 Work on the fix and commit your changes`,
                  `3. 🔀 Open a PR with \`closes #${issueNum}\` in the description`,
                  `4. ⏳ Please complete this within **7 days** or it may be unassigned`,
                  ``,
                  `| Detail | Value |`,
                  `|--------|-------|`,
                  `| 📌 Issue | #${issueNum} |`,
                  `| 👤 Assigned to | @${commenter} |`,
                  `| 🔒 Concurrent limit | ${assignedCount + 1} / ${TOTAL_LIMIT} (1 at a time) |`,
                  `| 📅 Assigned today | ${assignedTodayCount + 1} / ${DAILY_LIMIT} |`,
                  `| ☀️ Remaining slots today | ${remainingToday} |`,
                  ``,
                  `> ⚠️ You **cannot pick up another issue** until this one is resolved or unassigned.`,
                  ``,
                  `Good luck! 🚀 Feel free to ask questions in the comments if you're stuck.`,
                  ``,
                  `_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                ].join('\n'),
              });
              console.log(`✅ Assigned issue #${issueNum} to @${commenter} (${assignedCount + 1}/${TOTAL_LIMIT}, today: ${assignedTodayCount + 1}/${DAILY_LIMIT})`);
              return;
            }

            // ═════════════════════════════════════════════════════════════
            // HANDLE MAINTAINER ASSIGN @username
            // ═════════════════════════════════════════════════════════════
            if (maintainerAssignMatch) {
              const targetUser = maintainerAssignMatch[1];
              const canAssign  = await isMaintainer(commenter);

              if (!canAssign) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum,
                  body: `@${commenter} ❌ Only maintainers can assign issues to other contributors. You can assign yourself by commenting \`/assign\`.\n\n_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                });
                return;
              }

              const assignedCount = await countAssignedIssues(targetUser);
              if (assignedCount >= TOTAL_LIMIT) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum,
                  body: `@${commenter} ⚠️ Cannot assign — @${targetUser} already has **${assignedCount}/${TOTAL_LIMIT}** active issue. They must resolve it before taking another.\n\n_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                });
                return;
              }

              const assignedTodayCount = await countAssignedToday(targetUser);
              if (assignedTodayCount >= DAILY_LIMIT) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum,
                  body: `@${commenter} ⚠️ Cannot assign — @${targetUser} has already been assigned **${assignedTodayCount}/${DAILY_LIMIT}** issues today. The daily limit resets at midnight UTC.\n\n_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                });
                return;
              }

              await github.rest.issues.addAssignees({
                owner, repo, issue_number: issueNum, assignees: [targetUser],
              });
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNum, labels: ['gssoc:assigned'],
              });
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issueNum, name: 'gssoc:available',
                });
              } catch {}

              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNum,
                body: `✅ @${targetUser} has been assigned to this issue by @${commenter}. They now have **${assignedCount + 1}/${TOTAL_LIMIT}** concurrent issue (daily: ${assignedTodayCount + 1}/${DAILY_LIMIT}).\n\n> ⚠️ @${targetUser} cannot pick up another issue until this one is resolved.\n\n_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
              });
              console.log(`✅ Maintainer @${commenter} assigned issue #${issueNum} to @${targetUser}`);
              return;
            }

            // ═════════════════════════════════════════════════════════════
            // HANDLE UNASSIGN
            // ═════════════════════════════════════════════════════════════
            const isSelfUnassign      = selfUnassignPatterns.some(rx => rx.test(commentBody));
            const isMaintainerUnassign = unassignMatch !== null;

            if (isSelfUnassign || isMaintainerUnassign) {
              let targetUser = commenter;

              if (isMaintainerUnassign) {
                const canUnassign = await isMaintainer(commenter);
                if (!canUnassign) {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: issueNum,
                    body: `@${commenter} ❌ Only maintainers can unassign other contributors.\n\n_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                  });
                  return;
                }
                targetUser = unassignMatch[1];
              }

              if (!currentAssignees.includes(targetUser)) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum,
                  body: `@${commenter} ℹ️ @${targetUser} is not assigned to this issue.\n\n_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                });
                return;
              }

              await github.rest.issues.removeAssignees({
                owner, repo, issue_number: issueNum, assignees: [targetUser],
              });

              // If no more assignees, restore gssoc:available label
              const remaining = currentAssignees.filter(a => a !== targetUser);
              if (remaining.length === 0) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNum, labels: ['gssoc:available'],
                });
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: issueNum, name: 'gssoc:assigned',
                  });
                } catch {}
              }

              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNum,
                body: [
                  `## 🔓 Unassigned — @${targetUser}`,
                  ``,
                  isSelfUnassign
                    ? `@${targetUser} has been unassigned from this issue. This issue is now **open for others** to pick up.`
                    : `@${targetUser} has been unassigned by maintainer @${commenter}. This issue is now **open for others** to pick up.`,
                  ``,
                  `Anyone can now comment \`/assign\` to take it. 👇`,
                  ``,
                  `_GSSoC'26 automation · [@nisshchayarathi](https://github.com/nisshchayarathi)_`,
                ].join('\n'),
              });
              console.log(`🔓 Unassigned @${targetUser} from issue #${issueNum}`);
            }
